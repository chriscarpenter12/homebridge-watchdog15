name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - run: npm ci
      - name: publish
        if: github.repository == 'chriscarpenter12/homebridge-watchdog15' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
        run: |
          npm publish --access public --provenance
