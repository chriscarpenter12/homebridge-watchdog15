name: CI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: publish
        # if: github.repository == 'chriscarpenter12/homebridge-watchdog15' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
        run: |
          npm publish --provenance
